<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>SIGA - Investigação de Ativo</title>
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/historico.css" />
    <style>
      /* Estilos da Navegação Global */
      .main-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: var(--primary, #004a99);
        color: white;
        padding: 15px 20px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }
      .header-left {
        display: flex;
        align-items: center;
        gap: 15px;
      }
      .btn-back-header {
        color: white;
        text-decoration: none;
        font-size: 1.6rem;
        font-weight: bold;
        transition: transform 0.2s;
        line-height: 1;
      }
      .btn-back-header:hover {
        transform: scale(1.1);
      }
      .logo-container h1 {
        margin: 0;
        font-size: 1.5rem;
        letter-spacing: 1px;
      }
      .logo-container span {
        font-size: 0.8rem;
        color: #cbd5e1;
      }
      .user-info {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .avatar {
        background: white;
        color: var(--primary, #004a99);
        width: 35px;
        height: 35px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 900;
        font-size: 1.1rem;
      }
      .main-nav {
        display: flex;
        gap: 12px;
        padding: 15px 20px;
        background: white;
        overflow-x: auto;
        white-space: nowrap;
        margin-bottom: 20px;
        border-bottom: 1px solid #e2e8f0;
      }
      .main-nav::-webkit-scrollbar {
        height: 4px;
      }
      .main-nav::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
      }
      .nav-item {
        padding: 10px 18px;
        text-decoration: none;
        color: #475569;
        font-weight: 600;
        font-size: 0.95rem;
        border-radius: 8px;
        background: #f1f5f9;
        border: 1px solid #e2e8f0;
        transition: 0.3s;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .nav-item:hover {
        background: #e2e8f0;
        color: var(--primary, #004a99);
      }
      .nav-item.active {
        background: var(--primary, #004a99);
        color: white;
        border-color: var(--primary, #004a99);
        box-shadow: 0 4px 8px rgba(0, 74, 153, 0.25);
      }
      .page-title {
        color: var(--primary);
        margin-bottom: 20px;
        font-size: 1.4rem;
        border-bottom: 2px solid #e2e8f0;
        padding-bottom: 10px;
      }

      /* KPIs e Filtros */
      .kpi-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        margin-top: 20px;
      }
      .kpi-card {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        padding: 15px 10px;
        border-radius: 8px;
        text-align: center;
        transition: 0.3s;
      }
      .kpi-valor {
        font-size: 1.5rem;
        font-weight: 800;
        color: var(--primary);
        display: block;
        margin-bottom: 5px;
        transition: 0.3s;
      }
      .kpi-label {
        font-size: 0.75rem;
        color: var(--text-muted);
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .kpi-card.alerta .kpi-valor {
        color: var(--danger);
      }
      .header-timeline {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 15px;
        flex-wrap: wrap;
        gap: 10px;
      }
      .filtro-select {
        padding: 8px 12px;
        border-radius: 6px;
        border: 1px solid #cbd5e1;
        outline: none;
        font-size: 0.9rem;
        color: #444;
        background: white;
        cursor: pointer;
        font-weight: 600;
      }
      .filtro-select:focus {
        border-color: var(--primary);
      }
    </style>
  </head>
  <body>
    <header class="main-header">
      <div class="header-left">
        <a
          href="maquinario.html"
          class="btn-back-header"
          title="Voltar ao Painel"
          >←</a
        >
        <div class="logo-container">
          <h1>SIGA</h1>
          <span>Gestão de Ativos</span>
        </div>
      </div>
      <div class="user-info">
        <span style="font-size: 0.9rem; font-weight: bold">Operador</span>
        <div class="avatar">O</div>
      </div>
    </header>

    <nav class="main-nav">
      <a href="index.html" class="nav-item">🏠 Início</a>
      <a href="maquinario.html" class="nav-item active">⚙️ Maquinário</a>
      <a href="limpeza.html" class="nav-item">🧹 Limpeza 5S</a>
      <a href="#" class="nav-item">🚛 Frota</a>
    </nav>

    <main class="container">
      <h2 class="page-title">Investigação do Ativo</h2>

      <div class="cabecalho-maquina">
        <span class="tag-id" id="display-id">---</span>
        <h3 id="display-nome">Carregando Equipamento...</h3>

        <div class="kpi-grid">
          <div class="kpi-card">
            <span class="kpi-valor" id="kpi-intervencoes">0</span>
            <span class="kpi-label">Registos</span>
          </div>
          <div class="kpi-card alerta">
            <span class="kpi-valor" id="kpi-horas-paradas">0h</span>
            <span class="kpi-label">Tempo Parado</span>
          </div>
          <div class="kpi-card">
            <span class="kpi-valor" id="kpi-pecas">0</span>
            <span class="kpi-label">Peças Envolvidas</span>
          </div>
        </div>
      </div>

      <div class="timeline-container">
        <div class="header-timeline">
          <h4 style="color: var(--primary); font-size: 1.1rem; margin: 0">
            Log de Eventos
          </h4>
          <select id="filtro-status" class="filtro-select">
            <option value="Todos">Todos os Registos</option>
            <option value="Revisão">⏳ Solicitações Pendentes (Revisão)</option>
            <option value="Operacional">
              ✅ Registos Operacionais / Preditiva
            </option>
            <option value="Parada">🚨 Falhas Críticas (Paradas)</option>
            <option value="Troca">⚫ Em Troca</option>
          </select>
        </div>

        <ul id="lista-historico-completo" class="timeline-list"></ul>
      </div>
    </main>

    <div id="modal-relatorio" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h3 id="modal-titulo">Detalhes da Atividade</h3>
          <span class="close-modal" id="btn-fechar-modal">&times;</span>
        </div>
        <div id="modal-corpo" class="modal-body"></div>
      </div>
    </div>

    <div id="overlay" class="overlay">
      <div class="overlay-content">
        <div class="spinner"></div>
        <p>Minerando dados da nuvem...</p>
      </div>
    </div>

    <script type="module" src="js/app-historico.js"></script>
  </body>
</html>
