<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>SIGA - Painel de Maquinário</title>
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/maquinario.css" />
    <style>
      /* Estilos da Navegação Global */
      .main-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: var(--primary, #004a99);
        color: white;
        padding: 15px 20px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }
      .header-left {
        display: flex;
        align-items: center;
        gap: 15px;
      }
      .logo-container h1 {
        margin: 0;
        font-size: 1.5rem;
        letter-spacing: 1px;
      }
      .logo-container span {
        font-size: 0.8rem;
        color: #cbd5e1;
      }
      .user-info {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .avatar {
        background: white;
        color: var(--primary, #004a99);
        width: 35px;
        height: 35px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 900;
        font-size: 1.1rem;
      }
      .main-nav {
        display: flex;
        gap: 12px;
        padding: 15px 20px;
        background: white;
        overflow-x: auto;
        white-space: nowrap;
        margin-bottom: 20px;
        border-bottom: 1px solid #e2e8f0;
      }
      .main-nav::-webkit-scrollbar {
        height: 4px;
      }
      .main-nav::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
      }
      .nav-item {
        padding: 10px 18px;
        text-decoration: none;
        color: #475569;
        font-weight: 600;
        font-size: 0.95rem;
        border-radius: 8px;
        background: #f1f5f9;
        border: 1px solid #e2e8f0;
        transition: 0.3s;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .nav-item:hover {
        background: #e2e8f0;
        color: var(--primary, #004a99);
      }
      .nav-item.active {
        background: var(--primary, #004a99);
        color: white;
        border-color: var(--primary, #004a99);
        box-shadow: 0 4px 8px rgba(0, 74, 153, 0.25);
      }
      .page-title {
        color: var(--primary);
        margin-bottom: 20px;
        font-size: 1.4rem;
        border-bottom: 2px solid #e2e8f0;
        padding-bottom: 10px;
      }
    </style>
  </head>
  <body>
    <header class="main-header">
      <div class="header-left">
        <div class="logo-container">
          <h1>SIGA</h1>
          <span>Gestão de Ativos</span>
        </div>
      </div>
      <div class="user-info">
        <span style="font-size: 0.9rem; font-weight: bold">Operador</span>
        <div class="avatar">O</div>
      </div>
    </header>

    <nav class="main-nav">
      <a href="index.html" class="nav-item">🏠 Início</a>
      <a href="maquinario.html" class="nav-item active">⚙️ Maquinário</a>
      <a href="limpeza.html" class="nav-item">🧹 Limpeza 5S</a>
      <a href="#" class="nav-item">🚛 Frota</a>
    </nav>

    <main class="container">
      <h2 class="page-title">Painel de Maquinário</h2>
      <div id="painel-ativos"></div>
    </main>

    <div id="modal-relatorio" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h3 id="modal-titulo">Detalhes da Ordem de Serviço</h3>
          <span class="close-modal" id="btn-fechar-modal">&times;</span>
        </div>
        <div id="modal-corpo" class="modal-body"></div>
      </div>
    </div>

    <script type="module" src="js/app-maquinario.js"></script>
  </body>
</html>
