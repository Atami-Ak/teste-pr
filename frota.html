<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SIGA - Inspeção de Frota</title>
    <link rel="stylesheet" href="css/global.css">
    <style>
        /* ESTILOS ESPECÍFICOS DO MÓDULO DE FROTA */
        .main-header { display: flex; align-items: center; justify-content: space-between; background: var(--primary, #004a99); color: white; padding: 15px 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-back-header { color: white; text-decoration: none; font-size: 1.6rem; font-weight: bold; }
        .page-title { color: var(--primary); margin-bottom: 20px; font-size: 1.4rem; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
        
        /* Auto-Complete Inteligente de Veículos */
        .search-container { position: relative; margin-bottom: 20px; }
        .vehicle-list { position: absolute; top: 100%; left: 0; right: 0; background: white; border: 1px solid #cbd5e1; border-radius: 8px; max-height: 200px; overflow-y: auto; z-index: 100; box-shadow: 0 10px 25px rgba(0,0,0,0.15); display: none; }
        .vehicle-list.active { display: flex; flex-direction: column; }
        .vehicle-item { padding: 15px; border-bottom: 1px solid #f1f5f9; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: bold; color: #334155; transition: 0.2s;}
        .vehicle-item:hover { background: #f8fafc; color: var(--primary); }

        /* Estrutura do Checklist Mobile-First */
        .checklist-group { margin-bottom: 25px; background: white; border-radius: 8px; padding: 15px; border: 1px solid #e2e8f0; }
        .checklist-group h4 { background: #f1f5f9; padding: 12px; border-radius: 6px; color: #475569; margin-top: 0; margin-bottom: 15px; border-left: 4px solid var(--primary); font-size: 1.05rem;}
        .check-item { display: flex; flex-direction: column; gap: 10px; padding: 15px 0; border-bottom: 1px dashed #cbd5e1; }
        .check-item:last-child { border-bottom: none; padding-bottom: 0; }
        .check-label { font-size: 1rem; color: #334155; font-weight: 700; }
        .check-actions { display: flex; gap: 10px; width: 100%; }
        
        /* Botões de C e NC (Magia do CSS Moderno com :has) */
        .radio-btn { display: flex; align-items: center; justify-content: center; flex: 1; height: 50px; border-radius: 8px; font-weight: 900; font-size: 1.1rem; cursor: pointer; border: 2px solid #cbd5e1; background: #f8fafc; color: #94a3b8; transition: 0.2s; }
        .radio-btn input { display: none; }
        
        .radio-btn:has(input[value="C"]:checked) { background: #d1fae5; border-color: #10b981; color: #059669; }
        .radio-btn:has(input[value="NC"]:checked) { background: #fee2e2; border-color: #ef4444; color: #dc2626; }

        /* Grids Gerais */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .box-avaria { background: #fef2f2; border: 1px solid #f87171; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <header class="main-header">
        <a href="index.html" class="btn-back-header" title="Voltar">←</a>
        <div class="logo-container">
            <h1 style="margin:0; font-size: 1.3rem;">SIGA <span style="font-size:0.8rem; font-weight:normal; color:#cbd5e1;">Frota</span></h1>
        </div>
        <div style="width: 25px;"></div>
    </header>

    <main class="container" style="padding: 20px;">
        <h2 class="page-title">🚛 Checklist Diário</h2>
        
        <form id="form-frota" class="form-siga">
            
            <div class="form-section">
                <div class="search-container">
                    <label style="font-weight: bold; color: var(--primary);">Identificação do Veículo</label>
                    <input type="text" id="busca-veiculo" class="input-padrao" placeholder="🔍 Digite Placa ou Modelo..." autocomplete="off">
                    <div id="lista-veiculos" class="vehicle-list"></div>
                    <input type="hidden" id="veiculo-selecionado-id">
                </div>
            </div>

            <div class="form-section">
                <div class="form-group" style="display: flex; gap: 15px; margin-bottom: 20px;">
                    <label class="radio-btn" style="flex:1;">
                        <input type="radio" name="natureza" value="Saída" required> 🛫 Saída
                    </label>
                    <label class="radio-btn" style="flex:1;">
                        <input type="radio" name="natureza" value="Retorno" required> 🛬 Retorno
                    </label>
                </div>

                <div class="grid-2" style="margin-bottom: 15px;">
                    <div>
                        <label>Data</label>
                        <input type="date" id="data-inspecao" class="input-padrao" required readonly style="background: #f1f5f9; cursor: not-allowed;">
                    </div>
                    <div>
                        <label>Hora</label>
                        <input type="time" id="hora-inspecao" class="input-padrao" required readonly style="background: #f1f5f9; cursor: not-allowed;">
                    </div>
                </div>

                <div class="form-group">
                    <label>Motorista Responsável</label>
                    <input type="text" id="nome-motorista" class="input-padrao" placeholder="Nome completo" required>
                </div>
                
                <div class="form-group">
                    <label>Cidade / Rota de Destino</label>
                    <input type="text" id="cidade-destino" class="input-padrao" placeholder="Ex: Teresina - PI" required>
                </div>

                <div class="grid-2">
                    <div>
                        <label>Odômetro Atual (KM)</label>
                        <input type="number" id="km-veiculo" class="input-padrao" placeholder="Ex: 150000" required>
                    </div>
                    <div>
                        <label>Abastecimento (L)</label>
                        <input type="number" id="abastecimento" class="input-padrao" placeholder="Opcional">
                    </div>
                </div>
            </div>

            <div id="container-checklist">
                </div>

            <div class="box-avaria">
                <h4 style="color: #b91c1c; margin: 0 0 10px 0;">🚨 Registro de Avarias</h4>
                <p style="font-size: 0.85rem; color: #7f1d1d; margin-bottom: 15px;">Atenção: Se você marcou algum item como <strong>Não Conforme (NC)</strong>, o preenchimento abaixo e a foto são obrigatórios.</p>
                
                <div class="form-group">
                    <label>Descrição da Avaria</label>
                    <textarea id="descricao-avaria" class="input-padrao" placeholder="Descreva detalhadamente o que está danificado ou faltando..."></textarea>
                </div>

                <div class="form-group" style="margin-bottom: 0;">
                    <label for="foto-avaria" class="btn-camera" style="background: #dc2626; border:none; width: 100%; color: white; padding: 15px; text-align: center; border-radius: 8px; font-weight: bold; cursor: pointer; display: block;">📸 Anexar Foto da Avaria</label>
                    <input type="file" id="foto-avaria" accept="image/*" capture="environment" hidden>
                    <div id="preview-foto" style="margin-top: 15px; text-align: center;"></div>
                </div>
            </div>

            <button type="submit" class="btn-submit" id="btn-gravar" style="width: 100%; padding: 18px; font-size: 1.2rem;">GRAVAR INSPEÇÃO</button>
        </form>
    </main>

    <div id="overlay" class="overlay hidden">
        <div class="overlay-content">
            <div class="spinner"></div>
            <p id="overlay-text" style="color: white; font-weight: bold; margin-top: 15px;">Sincronizando Inspeção...</p>
        </div>
    </div>

    <script type="module" src="js/app-frota.js"></script>
</body>
</html>
